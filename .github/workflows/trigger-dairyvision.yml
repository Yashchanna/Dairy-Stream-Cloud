name: Trigger DairyVision Sync

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notify DairyVision
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.DAIRYVISION_TOKEN }}" \
          https://api.github.com/repos/Swapnil-2604/DairyVision/dispatches \
          -d '{"event_type":"sync"}'